<!doctype html>

    <link rel="stylesheet" href="css/IT-club.css" />
    <link rel="stylesheet" href="css/events.css" />
  </head>
  <body>
    <!-- ===== TOP NAVIGATION ===== -->
    <nav class="navbar" id="navbar">
      <a href="IT-club.html" class="navbar__brand">
        <span class="navbar__brand-icon">⚙️</span>

      </a>

      <ul class="navbar__links" id="navLinks">
        <li>
          <a href="IT-club.html"><span class="nav-icon">🏠</span> Home</a>
        </li>
        <li>
          <a href="info.html"><span class="nav-icon">ℹ️</span> Info</a>
        </li>
        <li>

        </li>
        <li>

        <li>
          <a href="IT-club.html#contact"

        </li>
        <li>

      <p style="color: var(--text-muted); font-size: 1.1rem">

    <section class="events-main-section">

      </div>

    <div

        text-align: center;
        margin: 2rem auto 3rem;
        color: var(--text-muted);
